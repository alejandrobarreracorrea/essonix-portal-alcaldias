name: Deploy Plataforma Alcaldías

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: infra
  ENVIRONMENT: pdn
  TF_BACKEND_BUCKET: essionix-s3-pdn-us-east-1-remotestates
  OIDC_ROLE_ARN: arn:aws:iam::484005000536:role/essionix-role-pdn-us-east-1-oidc

jobs:
  infra:
    name: Provisionar infraestructura (Terraform)
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    outputs:
      BUCKET_NAME: ${{ steps.tf-output.outputs.bucket_name }}
      DISTRIBUTION_ID: ${{ steps.tf-output.outputs.distribution_id }}

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar credenciales de AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4.2.1
        with:
          role-to-assume: ${{ env.OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0

      - name: Terraform init (backend remoto S3)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -input=false \
            -backend-config="bucket=${TF_BACKEND_BUCKET}" \
            -backend-config="key=${{ github.event.repository.name }}/${ENVIRONMENT}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}"

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_basic_auth_b64: ${{ secrets.BASIC_AUTH_B64 }}
        run: terraform apply -auto-approve -input=false

      - name: Exportar outputs de Terraform
        id: tf-output
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "bucket_name=$(terraform output -raw bucket_name)" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$(terraform output -raw distribution_id)" >> "$GITHUB_OUTPUT"

  deploy:
    name: Construir y publicar (build + S3 sync + invalidación)
    runs-on: ubuntu-latest
    needs: infra

    permissions:
      id-token: write
      contents: read

    env:
      BUCKET_NAME: ${{ needs.infra.outputs.BUCKET_NAME }}
      DISTRIBUTION_ID: ${{ needs.infra.outputs.DISTRIBUTION_ID }}

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Tests (gate — bloquea el deploy si fallan)
        run: npm test

      - name: Build (Vite → dist/)
        run: npm run build

      - name: Configurar credenciales de AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4.2.1
        with:
          role-to-assume: ${{ env.OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sincronizar assets con hash (caché inmutable)
        run: |
          if [ -z "${BUCKET_NAME}" ]; then
            echo "BUCKET_NAME vacío; revisa el output de Terraform."
            exit 1
          fi
          # Los assets de Vite (dist/assets/*) llevan hash en el nombre → caché larga.
          aws s3 sync dist/ "s3://${BUCKET_NAME}/" \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Sincronizar index.html (sin caché)
        run: |
          aws s3 sync dist/ "s3://${BUCKET_NAME}/" \
            --exclude "*" --include "index.html" \
            --cache-control "no-cache"

      - name: Invalidar caché de CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths "/*"
